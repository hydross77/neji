<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>For Neji</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #07070f;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      perspective: 1200px;
    }

    /* Ambient glow background */
    body::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(235,69,158,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    #trigger {
      color: #eb459e;
      font-size: 20px;
      font-weight: 700;
      text-decoration: none;
      padding: 18px 48px;
      border: 2px solid #eb459e;
      border-radius: 60px;
      cursor: pointer;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: transparent;
      position: relative;
      transition: box-shadow 0.3s, transform 0.3s, opacity 0.4s;
      box-shadow:
        0 0 18px rgba(235,69,158,0.35),
        0 0 40px rgba(235,69,158,0.12),
        inset 0 0 18px rgba(235,69,158,0.06);
    }

    #trigger:hover {
      transform: scale(1.06);
      box-shadow:
        0 0 30px rgba(235,69,158,0.7),
        0 0 70px rgba(235,69,158,0.25),
        inset 0 0 30px rgba(235,69,158,0.12);
    }

    #trigger.used {
      pointer-events: none;
      opacity: 0;
    }

    /* ---- kisses ---- */
    #stage {
      position: fixed;
      inset: 0;
      pointer-events: none;
      perspective: 900px;
      transform-style: preserve-3d;
    }

    .bisou {
      position: absolute;
      font-size: 64px;
      opacity: 0;
      will-change: transform, opacity;
      transform-style: preserve-3d;
      animation: pop3d 0.55s cubic-bezier(0.22, 1.6, 0.36, 1) forwards;
      filter: drop-shadow(0 0 14px rgba(235,69,158,0.9))
              drop-shadow(0 0 35px rgba(235,69,158,0.5));
    }

    @keyframes pop3d {
      0% {
        opacity: 0;
        transform: translateZ(-500px) rotateY(var(--ry-start)) rotateX(var(--rx-start)) scale(0.05);
      }
      55% {
        opacity: 1;
        transform: translateZ(40px) rotateY(calc(var(--ry-start) * -0.08)) rotateX(calc(var(--rx-start) * -0.05)) scale(1.18);
      }
      75% {
        transform: translateZ(-8px) rotateY(4deg) rotateX(-2deg) scale(0.96);
      }
      100% {
        opacity: 1;
        transform: translateZ(0px) rotateY(0deg) rotateX(0deg) scale(1);
      }
    }

    /* subtle float after appearing */
    .bisou.floating {
      animation: pop3d 0.55s cubic-bezier(0.22, 1.6, 0.36, 1) forwards,
                 float 3s ease-in-out var(--float-delay) infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) translateZ(0); }
      50%       { transform: translateY(-10px) translateZ(6px); }
    }
  </style>
</head>
<body>

  <a id="trigger" href="#">Pour Neji 💋</a>
  <div id="stage"></div>

  <script>
    const trigger = document.getElementById('trigger');
    const stage   = document.getElementById('stage');

    // 9 positions spread nicely across the viewport
    const spots = [
      { top:  '12%', left: '18%' },
      { top:   '8%', left: '48%' },
      { top:  '15%', left: '76%' },
      { top:  '44%', left:  '7%' },
      { top:  '46%', left: '46%' },
      { top:  '42%', left: '82%' },
      { top:  '74%', left: '18%' },
      { top:  '78%', left: '52%' },
      { top:  '72%', left: '82%' },
    ];

    trigger.addEventListener('click', function(e) {
      e.preventDefault();
      if (trigger.classList.contains('used')) return;
      trigger.classList.add('used');

      spots.forEach((pos, i) => {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'bisou';
          el.textContent = '💋';
          el.style.top  = pos.top;
          el.style.left = pos.left;

          // random 3-D entry angles for variety
          const ryStart = (Math.random() - 0.5) * 360;
          const rxStart = (Math.random() - 0.5) * 180;
          el.style.setProperty('--ry-start', ryStart + 'deg');
          el.style.setProperty('--rx-start', rxStart + 'deg');
          el.style.setProperty('--float-delay', (0.55 + Math.random() * 0.3) + 's');

          stage.appendChild(el);

          // switch to floating class after pop animation ends
          el.addEventListener('animationend', () => {
            el.classList.add('floating');
          }, { once: true });
        }, i * 200);
      });
    });
  </script>
</body>
</html>
